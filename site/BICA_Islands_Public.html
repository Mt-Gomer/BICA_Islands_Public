<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BICA Island Search</title>
<style>
  :root{
    --ink:#16303f;        /* chart ink navy */
    --paper:#f2f5f3;      /* pale chart paper */
    --panel:#ffffff;
    --shoal:#d7e4e8;      /* shallow-water tint */
    --buoy:#c2452d;       /* buoy red accent */
    --marker:#2f7a4d;     /* channel marker green accent */
    --dim:#5f7480;
    --mono:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
    --sans:"Avenir Next","Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.45;
       background-image:radial-gradient(circle,rgba(22,48,63,.06) 1px,transparent 1px);
       background-size:26px 26px;min-height:100vh}
  .wrap{max-width:760px;margin:0 auto;padding:2rem 1rem 4rem}
  header{display:flex;align-items:baseline;gap:.75rem;border-bottom:3px double var(--ink);
         padding-bottom:.6rem;margin-bottom:1.2rem;flex-wrap:wrap}
  h1{font-size:1.35rem;letter-spacing:.04em;font-weight:700}
  h1 .sub{text-transform:none;font-weight:400;letter-spacing:normal;color:var(--dim);font-size:.85em}
  #count{font-family:var(--mono);font-size:.8rem;color:var(--dim)}
  #searchbox{width:100%;font-size:1.15rem;padding:.7rem .9rem;border:2px solid var(--ink);
             border-radius:6px;background:var(--panel);font-family:var(--sans);color:var(--ink)}
  #searchbox:focus{outline:3px solid var(--buoy);outline-offset:1px;border-color:var(--buoy)}
  #results{margin-top:1.2rem}
  .pin{background:var(--panel);border:1px solid var(--shoal);border-left:4px solid var(--buoy);
       border-radius:0 6px 6px 0;padding:.8rem 1rem;margin-bottom:.7rem}
  .pin h2{font-size:1.02rem;font-weight:600}
  .pin-head{display:flex;justify-content:space-between;align-items:flex-start;gap:.6rem}
  .pin-head h2{flex:1 1 auto}
  .optin-btn{flex:0 0 auto;font-family:var(--mono);font-size:.68rem;text-decoration:none;
        white-space:nowrap;color:#fff;background:var(--marker);border:1px solid var(--marker);
        border-radius:4px;padding:.3rem .55rem;cursor:pointer}
  .optin-btn:hover{opacity:.85}
  .optin-btn:focus-visible{outline:3px solid var(--ink);outline-offset:1px}
  .path{font-family:var(--mono);font-size:.7rem;color:var(--dim);text-transform:uppercase;
        letter-spacing:.05em;margin-bottom:.15rem}
  .coords{font-family:var(--mono);font-size:.82rem;color:var(--dim);margin:.15rem 0 .4rem}
  .desc{font-size:.85rem;color:var(--ink);margin:.3rem 0 .45rem;max-height:5.5em;overflow:auto;
        white-space:pre-wrap;word-break:break-word}
  .links{display:flex;gap:.5rem;flex-wrap:wrap}
  .links a,.links button{font-family:var(--mono);font-size:.75rem;text-decoration:none;
        color:var(--ink);background:var(--paper);border:1px solid var(--ink);border-radius:4px;
        padding:.3rem .6rem;cursor:pointer}
  .links a:hover,.links button:hover{background:var(--ink);color:var(--paper)}
  .links a:focus-visible,.links button:focus-visible,#searchbox:focus-visible{outline:3px solid var(--buoy)}
  mark{background:#ffe08a;color:inherit;padding:0 1px}
  .empty{color:var(--dim);font-style:italic;padding:1rem 0}
  @media (prefers-reduced-motion:no-preference){
    .pin{animation:rise .12s ease-out}
    @keyframes rise{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
  }

  dialog#shareModal{border:2px solid var(--ink);border-radius:8px;padding:0;max-width:420px;
        width:calc(100% - 2rem);color:var(--ink);font-family:var(--sans)}
  dialog#shareModal::backdrop{background:rgba(22,48,63,.45)}
  #shareModal .modal-body{padding:1.1rem 1.2rem}
  #shareModal h3{font-size:1.05rem;margin-bottom:.2rem}
  #shareModal .modal-tp{font-family:var(--mono);font-size:.8rem;color:var(--dim);margin-bottom:.7rem}
  #shareModal p.hint{font-size:.78rem;color:var(--dim);margin-bottom:.8rem}
  #shareModal label{display:block;font-size:.82rem;font-weight:600;margin:.6rem 0 .25rem}
  #shareModal input[type="text"],#shareModal input[type="email"],#shareModal textarea{
        width:100%;font-family:var(--sans);font-size:.9rem;padding:.5rem .6rem;
        border:1px solid var(--ink);border-radius:5px;background:var(--panel);color:var(--ink)}
  #shareModal textarea{min-height:4.5em;resize:vertical}
  #shareModal .consent{display:flex;gap:.5rem;align-items:flex-start;margin-top:.8rem;font-size:.78rem}
  #shareModal .consent input{margin-top:.2rem}
  #shareModal .modal-actions{display:flex;justify-content:flex-end;gap:.5rem;margin-top:1rem}
  #shareModal .modal-actions button{font-family:var(--mono);font-size:.8rem;padding:.4rem .8rem;
        border-radius:4px;cursor:pointer}
  #shareModal .modal-actions button[value="cancel"]{background:var(--paper);border:1px solid var(--ink);color:var(--ink)}
  #shareModal .modal-actions button[type="submit"]{background:var(--buoy);border:1px solid var(--buoy);color:#fff}
  #shareModal .modal-actions button:hover{opacity:.85}
  #shareModal .status{font-size:.8rem;margin-top:.6rem}
  #shareModal .status.error{color:var(--buoy)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>BICA ISLAND SEARCH <span class="sub">(TP numbers only)</span></h1>
    <span id="count">no file loaded</span>
  </header>

  <input id="searchbox" type="search" placeholder="Search full or partial TP numbers…"
         autocomplete="off" disabled aria-label="Search pins">

  <div id="results" aria-live="polite"></div>
</div>

<dialog id="shareModal">
  <form class="modal-body" method="dialog" id="shareForm">
    <h3>Share info about this pin</h3>
    <div class="modal-tp" id="shareModalTP"></div>
    <p class="hint">Optional. This is opt-in only — nothing you enter here appears on the
      public map. It goes to the site maintainer, who reviews and manually adds it later.</p>

    <label for="shareName">Name / owner (optional)</label>
    <input type="text" id="shareName" name="name" maxlength="120" autocomplete="off">

    <label for="shareNotes">Notes (optional)</label>
    <textarea id="shareNotes" name="notes" maxlength="1000"></textarea>

    <label for="shareEmail">Your email (optional, in case we have questions)</label>
    <input type="email" id="shareEmail" name="email" autocomplete="off">

    <label class="consent">
      <input type="checkbox" id="shareConsent" required>
      <span>I'm choosing to share this information publicly and confirm I'm the owner
        or otherwise authorized to share it for this pin.</span>
    </label>

    <div class="status" id="shareStatus" role="status" aria-live="polite"></div>

    <div class="modal-actions">
      <button type="button" value="cancel" id="shareCancel">Cancel</button>
      <button type="submit" id="shareSubmit">Submit</button>
    </div>
  </form>
</dialog>

<!-- ================================================================
     PIN DATA
     This page loads its pins from a file named  BICA_Islands_Public.kml
     located in the SAME directory as this HTML file.

     To update the pins: replace BICA_Islands_Public.kml with a new export.
     This HTML file never needs to be edited.
     ================================================================ -->

<script>
(function(){
  "use strict";
  var pins = [];
  var box = document.getElementById("searchbox");
  var results = document.getElementById("results");
  var count = document.getElementById("count");

  // ---- KML parsing -------------------------------------------------------
  function parseKML(text){
    var doc = new DOMParser().parseFromString(text, "application/xml");
    if (doc.querySelector("parsererror")) throw new Error("Not valid KML/XML.");

    // Map Schema SimpleField internal names -> human displayNames
    var fieldNames = {};
    var sf = doc.getElementsByTagName("SimpleField");
    for (var f = 0; f < sf.length; f++){
      var dn = sf[f].getElementsByTagName("displayName")[0];
      fieldNames[sf[f].getAttribute("name")] = dn ? dn.textContent.trim() : sf[f].getAttribute("name");
    }
    var SKIP_FIELDS = /^(X|Y|unnamed( \(\d+\))?)$/i;

    var out = [];
    var placemarks = doc.getElementsByTagName("Placemark");
    for (var i = 0; i < placemarks.length; i++){
      var pm = placemarks[i];
      // Point coordinates only (pins). Skip lines/polygons.
      var pt = pm.getElementsByTagName("Point")[0];
      if (!pt) continue;
      var coordEl = pt.getElementsByTagName("coordinates")[0];
      if (!coordEl) continue;
      var parts = coordEl.textContent.trim().split(",");
      var lng = parseFloat(parts[0]), lat = parseFloat(parts[1]);
      if (isNaN(lat) || isNaN(lng)) continue;

      var name = childText(pm, "name") || "(unnamed)";
      var desc = childText(pm, "description") || "";
      // strip HTML from description for search/display
      var descPlain = desc.replace(/<br\s*\/?>/gi, "\n").replace(/<[^>]*>/g, " ")
                          .replace(/[ \t]+/g, " ").trim();
      // Clean spreadsheet-import boilerplate:
      // "X: -81.79 Y: 46.06 description: OWNER unnamed (1): unnamed (2):"
      descPlain = cleanImportedDesc(descPlain);

      // ExtendedData: <Data name="x"><value>y</value></Data> and SchemaData/SimpleData
      var meta = [];
      var dataEls = pm.getElementsByTagName("Data");
      for (var d = 0; d < dataEls.length; d++){
        var k = dataEls[d].getAttribute("name") || "";
        var v = childText(dataEls[d], "value") || "";
        if (SKIP_FIELDS.test(k) || !v) continue;
        meta.push(k + ": " + v);
      }
      var simple = pm.getElementsByTagName("SimpleData");
      for (var s = 0; s < simple.length; s++){
        var rawK = simple[s].getAttribute("name") || "";
        var label = fieldNames[rawK] || rawK;
        var val = simple[s].textContent.trim();
        if (SKIP_FIELDS.test(label) || !val) continue;
        // avoid duplicating the description already shown
        if (label === "description" && descPlain.indexOf(val) !== -1) continue;
        meta.push(label + ": " + val);
      }

      // Folder path for context
      var path = [], node = pm.parentNode;
      while (node && node.tagName){
        if (node.tagName === "Folder" || node.tagName === "Document"){
          var fn = childText(node, "name");
          if (fn) path.unshift(fn);
        }
        node = node.parentNode;
      }

      out.push({
        name: name, desc: descPlain, meta: meta, path: path.join(" › "),
        lat: lat, lng: lng,
        hay: (name + " " + descPlain + " " + meta.join(" ") + " " + path.join(" ")).toLowerCase()
      });
    }
    return out;
  }

  function cleanImportedDesc(s){
    var flat = s.replace(/\n/g, " ");
    var m = flat.match(/^X:\s*[-\d.]+\s+Y:\s*[-\d.]+\s+description:\s*(.*?)\s*unnamed \(1\):\s*(.*?)\s*unnamed \(2\):\s*(.*)$/);
    if (!m) return s;
    var kept = [m[1], m[2], m[3]].map(function(x){ return x.replace(/[;\s]+$/, "").trim(); })
                                 .filter(Boolean);
    return kept.join(" · ");
  }

  // direct-child text (avoids grabbing nested Placemark names inside Folders)
  function childText(el, tag){
    for (var i = 0; i < el.children.length; i++){
      if (el.children[i].tagName === tag) return el.children[i].textContent.trim();
    }
    return "";
  }

  // ---- Auto-load: BICA_Islands_Public.kml next to this file ----
  var KML_FILE = "BICA_Islands_Public.kml";

  function activate(kmlText){
    // strip BOM / leading whitespace so the XML declaration is at position 0
    pins = parseKML(kmlText.replace(/^\uFEFF/, "").trim());
    count.textContent = pins.length + " pins loaded";
    box.disabled = false;
    box.focus();
    render(box.value);
  }

  function init(){
    fetch(KML_FILE, {cache: "no-store"})
      .then(function(r){ if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(function(text){ activate(text); })
      .catch(function(){
        count.textContent = "could not load " + KML_FILE;
      });
  }
  init();

  // ---- Search ------------------------------------------------------------
  var t = null;
  box.addEventListener("input", function(){
    clearTimeout(t);
    t = setTimeout(function(){ render(box.value); }, 120);
  });

  function render(query){
    var q = query.trim().toLowerCase();
    results.innerHTML = "";
    if (!q){
      results.innerHTML = '<p class="empty">Type to search ' + pins.length
        + ' location pins. All were manually annotated and could have errors.</p>';
      return;
    }
    var terms = q.split(/\s+/);
    var hits = pins.filter(function(p){
      return terms.every(function(term){ return p.hay.indexOf(term) !== -1; });
    });
    if (!hits.length){
      results.innerHTML = '<p class="empty">No pins match \u201C' + escapeHTML(query) + '\u201D.</p>';
      return;
    }
    var frag = document.createDocumentFragment();
    hits.slice(0, 200).forEach(function(p){ frag.appendChild(pinCard(p, terms)); });
    results.appendChild(frag);
    if (hits.length > 200){
      var more = document.createElement("p");
      more.className = "empty";
      more.textContent = hits.length + " matches — showing first 200. Narrow the search.";
      results.appendChild(more);
    }
  }

  function pinCard(p, terms){
    var el = document.createElement("div");
    el.className = "pin";
    var lat = p.lat.toFixed(6), lng = p.lng.toFixed(6);
    var ll = lat + "," + lng;
    var encName = encodeURIComponent(p.name);

    var gmaps = "https://www.google.com/maps/search/?api=1&query=" + ll;
    var amaps = "https://maps.apple.com/?ll=" + ll + "&q=" + encName;
    var geo   = "geo:" + ll + "?q=" + ll + "(" + encName + ")";

    var html = "";
    if (p.path) html += '<div class="path">' + hl(p.path, terms) + '</div>';
    html += '<div class="pin-head"><h2>' + hl(p.name, terms) + '</h2>'
          + '<button type="button" class="optin-btn" data-share="1">Opt-In Owner Info or Correction</button></div>';
    html += '<div class="coords">' + ll + "</div>";
    if (p.desc) html += '<div class="desc">' + hl(p.desc, terms) + "</div>";
    if (p.meta.length) html += '<div class="desc">' + hl(p.meta.join(" · "), terms) + "</div>";
    html += '<div class="links">'
          + '<a href="' + gmaps + '" target="_blank" rel="noopener">Google Maps</a>'
          + '<a href="' + amaps + '" target="_blank" rel="noopener">Apple Maps</a>'
          + '<a href="' + geo + '">geo: (mobile)</a>'
          + '<button type="button" data-copy="' + ll + '">Copy coords</button>'
          + '<button type="button" data-kml="1">Download pin .kml</button>'
          + "</div>";
    el.innerHTML = html;

    el.querySelector("[data-copy]").addEventListener("click", function(){
      navigator.clipboard.writeText(ll).then(function(){
        var b = el.querySelector("[data-copy]");
        b.textContent = "Copied";
        setTimeout(function(){ b.textContent = "Copy coords"; }, 1200);
      });
    });
    el.querySelector("[data-kml]").addEventListener("click", function(){
      downloadPinKML(p);
    });
    el.querySelector("[data-share]").addEventListener("click", function(){
      openShareModal(p);
    });
    return el;
  }

  // ---- Opt-in "share your info" modal ------------------------------------
  // Submissions go to Formspree, NOT into the live KML. They land in your
  // Formspree inbox/spreadsheet for manual review before you merge anything
  // into BICA_Islands_Public.kml. See README "Opt-in submissions" section.
  var FORMSPREE_ENDPOINT = "https://formspree.io/f/YOUR_FORM_ID";

  var shareModal = document.getElementById("shareModal");
  var shareForm = document.getElementById("shareForm");
  var shareStatus = document.getElementById("shareStatus");
  var shareModalTP = document.getElementById("shareModalTP");
  var shareSubmit = document.getElementById("shareSubmit");
  var currentSharePin = null;

  function openShareModal(p){
    currentSharePin = p;
    shareModalTP.textContent = p.name + "  ·  " + p.lat.toFixed(6) + "," + p.lng.toFixed(6);
    shareForm.reset();
    shareStatus.textContent = "";
    shareStatus.className = "status";
    shareSubmit.disabled = false;
    shareSubmit.textContent = "Submit";
    shareModal.showModal();
  }

  document.getElementById("shareCancel").addEventListener("click", function(){
    shareModal.close();
  });

  shareForm.addEventListener("submit", function(ev){
    ev.preventDefault();
    if (!currentSharePin) return;
    if (FORMSPREE_ENDPOINT.indexOf("YOUR_FORM_ID") !== -1){
      shareStatus.className = "status error";
      shareStatus.textContent = "Submissions aren't configured yet on this deployment.";
      return;
    }
    var payload = {
      tp_number: currentSharePin.name,
      lat: currentSharePin.lat,
      lng: currentSharePin.lng,
      name: document.getElementById("shareName").value.trim(),
      notes: document.getElementById("shareNotes").value.trim(),
      email: document.getElementById("shareEmail").value.trim()
    };
    shareSubmit.disabled = true;
    shareSubmit.textContent = "Submitting…";
    shareStatus.className = "status";
    shareStatus.textContent = "";
    fetch(FORMSPREE_ENDPOINT, {
      method: "POST",
      headers: {"Content-Type": "application/json", "Accept": "application/json"},
      body: JSON.stringify(payload)
    }).then(function(r){
      if (!r.ok) throw new Error("bad status " + r.status);
      shareStatus.className = "status";
      shareStatus.textContent = "Thanks — submitted for review.";
      shareSubmit.textContent = "Submitted";
      setTimeout(function(){ shareModal.close(); }, 1100);
    }).catch(function(){
      shareStatus.className = "status error";
      shareStatus.textContent = "Something went wrong. Please try again later.";
      shareSubmit.disabled = false;
      shareSubmit.textContent = "Submit";
    });
  });

  function downloadPinKML(p){
    var kml = '<?xml version="1.0" encoding="UTF-8"?>\n'
      + '<kml xmlns="http://www.opengis.net/kml/2.2"><Document><Placemark>'
      + "<name>" + escapeXML(p.name) + "</name>"
      + (p.desc ? "<description>" + escapeXML(p.desc) + "</description>" : "")
      + "<Point><coordinates>" + p.lng + "," + p.lat + ",0</coordinates></Point>"
      + "</Placemark></Document></kml>";
    var blob = new Blob([kml], {type: "application/vnd.google-earth.kml+xml"});
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = p.name.replace(/[^\w\- ]+/g, "").trim().replace(/\s+/g, "_") + ".kml";
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function escapeHTML(s){
    return s.replace(/[&<>"]/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];
    });
  }
  function escapeXML(s){
    return s.replace(/[&<>]/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c];
    });
  }
  // highlight search terms
  function hl(s, terms){
    var safe = escapeHTML(s);
    terms.forEach(function(term){
      if (!term) return;
      var re = new RegExp("(" + term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "ig");
      safe = safe.replace(re, "<mark>$1</mark>");
    });
    return safe;
  }
})();
</script>
</body>
</html>
